name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      # studio (Tauri app) excluded: it needs a built frontend (dist/); see the `studio` job.
      - run: cargo clippy --workspace --exclude studio --all-targets -- -D warnings
      - run: cargo test --workspace --exclude studio
      - run: bash scripts/assert-lean.sh
      # Docs must build (catches doc-code + structural errors). Not -D warnings:
      # mathematical notation like `[v;ω]` trips rustdoc's intra-doc-link lint as a
      # false positive and merely renders as literal text, which is intended.
      - run: cargo doc --workspace --exclude studio --no-deps
      # Compile the criterion benchmarks (don't run them) so they can't rot.
      - run: cargo bench --workspace --exclude studio --no-run

  studio:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm --prefix apps/studio ci
      - run: npm --prefix apps/studio run test
      - run: npm --prefix apps/studio run build
      - run: cargo build -p studio

  python:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      # numpy + pin (Pinocchio) make oracle/tests/test_pinocchio.py actually RUN
      # (it importorskips otherwise) — the independent FK/Jacobian cross-validation.
      # pyarrow makes oracle/tests/test_lerobot_dataset.py actually RUN (it
      # importorskips otherwise) — the LeRobotDataset v2.1 writer cross-validation.
      - run: uv venv && uv pip install maturin pytest numpy pin pyarrow
      - run: uv run maturin develop -m crates/caliper-py/Cargo.toml
      - run: uv run python -m pytest oracle -v

  learn:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      # Phase-7 learning sidecar (learn/caliper_learn): CPU-only torch oracle —
      # a 2-sample overfit smoke, checkpoint round-trip, and a closed-loop sim
      # rollout. Needs caliper (PyO3) built into the same env as torch.
      - run: uv venv && uv pip install maturin pytest numpy pyarrow torch
      - run: uv run maturin develop -m crates/caliper-py/Cargo.toml
      - run: uv pip install -e learn
      - run: uv run python -m pytest learn -v

  docs:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # mdBook docs site must BUILD (catches broken SUMMARY links, malformed
      # chapters, missing files) — prebuilt binary, no cargo install needed.
      - run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-aarch64-apple-darwin.tar.gz | tar xz
          ./mdbook build docs/book

  # Publish the built book to GitHub Pages (https://msannikov03.github.io/caliper/).
  # Push-to-main only — PRs get the `docs` build check above, never a deploy.
  # Rebuilds on ubuntu: actions/upload-pages-artifact needs GNU tar, which the
  # macOS runners don't ship. Requires Pages enabled with Source = GitHub Actions.
  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -sL https://github.com/rust-lang/mdBook/releases/download/v0.4.52/mdbook-v0.4.52-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./mdbook build docs/book
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book
      - id: deployment
        uses: actions/deploy-pages@v4
