name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_crates:
        description: "Really publish to crates.io (otherwise the crates job only dry-runs)"
        type: boolean
        default: false

jobs:
  version-check:
    # On a v* tag the tag, the workspace Cargo.toml, and the wheel's pyproject
    # must all agree — catches "bumped one, forgot the other" before anything
    # builds or uploads. On a branch dispatch there is nothing to compare.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "not a version tag — nothing to check"; exit 0 ;;
          esac
          tag="${GITHUB_REF_NAME#v}"
          cargo=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n1)
          wheel=$(sed -n 's/^version = "\(.*\)"$/\1/p' crates/caliper-py/pyproject.toml | head -n1)
          echo "tag=$tag cargo=$cargo wheel=$wheel"
          [ "$tag" = "$cargo" ] && [ "$tag" = "$wheel" ]

  wheels:
    # abi3 wheels (workspace pyo3 is abi3-py310): ONE wheel per platform covers
    # every CPython >= 3.10. The engine is pure Rust with no OS-gated crates,
    # so the same manifest builds on both targets; on linux maturin-action runs
    # inside a manylinux container so the wheel is portable across distros.
    # No sdist: maturin sdists of a workspace member drag in the whole cargo
    # workspace (incl. the Tauri app) — binary wheels are the supported path.
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - platform: manylinux-x86_64
            os: ubuntu-latest
            target: x86_64
            manylinux: auto
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --manifest-path crates/caliper-py/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error

  release-assets:
    # Attach the wheels to the GitHub release for the tag (created if missing).
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  publish-pypi:
    # Uploads the wheels to PyPI as `caliper-robotics` (bare `caliper` is
    # taken; the import name stays `caliper`). Skips with a notice until the
    # PYPI_API_TOKEN repo secret exists — add it, then re-run this workflow
    # from the tag. --skip-existing makes the re-run idempotent.
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check for PyPI token
        id: token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=PyPI publish skipped::PYPI_API_TOKEN is not set — add the repo secret and re-run this workflow from the tag."
          fi
      - uses: actions/download-artifact@v4
        if: steps.token.outputs.present == 'true'
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: PyO3/maturin-action@v1
        if: steps.token.outputs.present == 'true'
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-crates:
    # cargo >= 1.90 multi-package publish: ONE invocation, and cargo handles
    # dependency ordering + verify-builds against the not-yet-published local
    # siblings (rust-toolchain.toml tracks stable, so the runner has it).
    # The list is every publishable crate in dependency order; excluded:
    # studio (Tauri app) and caliper-py (ships via PyPI, not crates.io).
    #
    # ⚠ crates.io names (checked 2026-07-09): every caliper-* sub-crate name is
    # free, but bare `caliper` is TAKEN by an existing crate — the facade (and
    # caliper-cli, which depends on it) cannot be published under this name.
    # The dry-run still validates packaging end-to-end; before flipping the
    # real publish, rename the facade or resolve the name with its owner.
    # A real publish is NOT atomic: crates land one at a time and cannot be
    # unpublished (only yanked), hence the double gate below.
    needs: version-check
    runs-on: ubuntu-latest
    env:
      CRATES: >-
        -p caliper-spatial -p caliper-model -p caliper-kinematics
        -p caliper-dynamics -p caliper-ik -p caliper-calib -p caliper-motion
        -p caliper-hal -p caliper-collision -p caliper-trajopt
        -p caliper-planning -p caliper-graph -p caliper -p caliper-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish (dry run)
        run: cargo publish --dry-run $CRATES
      - name: Check for crates.io token
        id: token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=crates.io publish skipped::CARGO_REGISTRY_TOKEN is not set — dry-run only."
          fi
      - name: Publish (real)
        # Requires BOTH the token and an explicit workflow_dispatch opt-in;
        # a bare tag push never publishes to crates.io.
        if: steps.token.outputs.present == 'true' && inputs.publish_crates == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish $CRATES
